spring:
  application:
    name: community-creation-api
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false

server:
  port: 8080

community:
  cors:
    allowed-origins: ${COMMUNITY_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
