server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: never

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/cms}
    username: ${SPRING_DATASOURCE_USERNAME:cms}
    password: ${SPRING_DATASOURCE_PASSWORD:cms}
  servlet:
    multipart:
      max-file-size: ${CMS_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${CMS_UPLOAD_MAX_REQUEST_SIZE:20MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

cms:
  jwt:
    secret: ${JWT_SECRET:ChangeMeJwtSecret1234567890ABCDEF}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  upload:
    base-path: ${UPLOAD_BASE_PATH:/app/uploads}
    max-file-size-bytes: ${UPLOAD_MAX_FILE_SIZE_BYTES:10485760}
    max-request-size-bytes: ${UPLOAD_MAX_REQUEST_SIZE_BYTES:20971520}
    allowed-extensions: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,md,zip
