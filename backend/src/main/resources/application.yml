server:
  port: ${PORT:8085}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/cms}
    username: ${DB_USER:cms}
    password: ${DB_PASSWORD:cms}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.cms: INFO

cms:
  cors:
    allowed-origins: ${CORS_ORIGIN:http://localhost:5188}
  storage:
    base-url: ${STORAGE_BASE_URL:http://localhost:8085/uploads}
