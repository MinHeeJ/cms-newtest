openapi: 3.0.3
info:
  title: Community Creation API
  version: 0.1.0
  description: REST contract for creating, configuring, reviewing, and launching communities.
servers:
  - url: https://api.example.com
    description: Production API origin
  - url: http://localhost:8080
    description: Local development API origin
security:
  - bearerAuth: []
tags:
  - name: CommunityCreation
    description: Member-facing community creation workflow
  - name: CommunityReview
    description: Operator review workflow
  - name: Communities
    description: Read access for launched communities
paths:
  /api/v1/community-creation/slug-check:
    post:
      tags:
        - CommunityCreation
      operationId: checkCommunitySlug
      summary: Check whether a community address is available
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlugCheckRequest"
      responses:
        "200":
          description: Address validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlugCheckResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/community-creation/requests:
    post:
      tags:
        - CommunityCreation
      operationId: createCommunityCreationRequest
      summary: Start a new community creation draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityDraftRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreationRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/community-creation/requests/{requestId}:
    get:
      tags:
        - CommunityCreation
      operationId: getCommunityCreationRequest
      summary: Retrieve a creation request draft or submitted request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Creation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreationRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - CommunityCreation
      operationId: updateCommunityCreationRequest
      summary: Save draft identity and access settings
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommunityCreationRequest"
      responses:
        "200":
          description: Updated creation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreationRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/community-creation/requests/{requestId}/boards:
    put:
      tags:
        - CommunityCreation
      operationId: replaceDraftBoards
      summary: Replace initial board configuration for a draft
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - boards
              properties:
                boards:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/BoardInput"
      responses:
        "200":
          description: Updated draft boards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreationRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/community-creation/requests/{requestId}/rules:
    put:
      tags:
        - CommunityCreation
      operationId: replaceDraftRules
      summary: Replace initial community rules for a draft
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rules
              properties:
                rules:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/RuleInput"
      responses:
        "200":
          description: Updated draft rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreationRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/community-creation/requests/{requestId}/moderator-invitations:
    put:
      tags:
        - CommunityCreation
      operationId: replaceModeratorInvitations
      summary: Replace initial moderator invitation list for a draft
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invitations
              properties:
                invitations:
                  type: array
                  items:
                    $ref: "#/components/schemas/ModeratorInvitationInput"
      responses:
        "200":
          description: Updated draft invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreationRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/community-creation/requests/{requestId}/submit:
    post:
      tags:
        - CommunityCreation
      operationId: submitCommunityCreationRequest
      summary: Submit a draft for launch or operator review
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 16
            maxLength: 128
      responses:
        "200":
          description: Existing result for the same idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitCommunityCreationResponse"
        "201":
          description: Request submitted and launched or queued for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitCommunityCreationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/communities/{communityId}:
    get:
      tags:
        - Communities
      operationId: getCommunity
      summary: Get a launched community
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Community detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/admin/community-creation/reviews:
    get:
      tags:
        - CommunityReview
      operationId: listCommunityCreationReviews
      summary: List community creation requests awaiting or recently processed by review
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReviewQueueStatus"
        - name: riskLevel
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RiskLevel"
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Review queue page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueuePage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/community-creation/reviews/{requestId}:
    get:
      tags:
        - CommunityReview
      operationId: getCommunityCreationReviewDetail
      summary: Get review detail for a community creation request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Review detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/admin/community-creation/reviews/{requestId}/decision:
    post:
      tags:
        - CommunityReview
      operationId: decideCommunityCreationReview
      summary: Approve, reject, or request changes for a creation request
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Review decision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDecisionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SlugCheckRequest:
      type: object
      required:
        - slug
      properties:
        slug:
          type: string
          minLength: 3
          maxLength: 40
          pattern: "^[a-z0-9][a-z0-9-]{1,38}[a-z0-9]$"
          example: movie-talk
    SlugCheckResponse:
      type: object
      required:
        - slug
        - normalizedSlug
        - available
      properties:
        slug:
          type: string
        normalizedSlug:
          type: string
        available:
          type: boolean
        reasonCode:
          type: string
          nullable: true
          example: SLUG_TAKEN
        message:
          type: string
          nullable: true
          example: 이미 사용 중인 주소입니다.
    CreateCommunityDraftRequest:
      type: object
      properties:
        source:
          type: string
          enum:
            - HEADER_BUTTON
            - CATEGORY_PAGE
            - CAMPAIGN
          default: HEADER_BUTTON
    UpdateCommunityCreationRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 40
          example: 영화 수다방
        slug:
          type: string
          minLength: 3
          maxLength: 40
          example: movie-talk
        categoryId:
          type: string
          format: uuid
        description:
          type: string
          maxLength: 200
          example: 영화 감상과 추천을 나누는 커뮤니티
        visibility:
          $ref: "#/components/schemas/CommunityVisibility"
        joinPolicy:
          $ref: "#/components/schemas/JoinPolicy"
        representativeImageId:
          type: string
          format: uuid
          nullable: true
    CommunityCreationRequest:
      type: object
      required:
        - id
        - creatorUserId
        - status
        - boards
        - rules
        - moderatorInvitations
        - validationErrors
        - riskSignals
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        creatorUserId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        visibility:
          allOf:
            - $ref: "#/components/schemas/CommunityVisibility"
          nullable: true
        joinPolicy:
          allOf:
            - $ref: "#/components/schemas/JoinPolicy"
          nullable: true
        status:
          $ref: "#/components/schemas/CreationRequestStatus"
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        boards:
          type: array
          items:
            $ref: "#/components/schemas/Board"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
        moderatorInvitations:
          type: array
          items:
            $ref: "#/components/schemas/ModeratorInvitation"
        validationErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
        riskSignals:
          type: array
          items:
            $ref: "#/components/schemas/RiskSignal"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SubmitCommunityCreationResponse:
      type: object
      required:
        - result
        - request
      properties:
        result:
          type: string
          enum:
            - LAUNCHED
            - PENDING_REVIEW
            - VALIDATION_FAILED
        communityId:
          type: string
          format: uuid
          nullable: true
        request:
          $ref: "#/components/schemas/CommunityCreationRequest"
    BoardInput:
      type: object
      required:
        - name
        - type
        - postPermission
        - commentPermission
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 30
        description:
          type: string
          maxLength: 120
        type:
          $ref: "#/components/schemas/BoardType"
        postPermission:
          $ref: "#/components/schemas/Role"
        commentPermission:
          $ref: "#/components/schemas/Role"
        displayOrder:
          type: integer
          minimum: 1
    Board:
      allOf:
        - $ref: "#/components/schemas/BoardInput"
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
    RuleInput:
      type: object
      required:
        - title
        - body
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 40
        body:
          type: string
          minLength: 1
          maxLength: 1000
        displayOrder:
          type: integer
          minimum: 1
        required:
          type: boolean
          default: true
    Rule:
      allOf:
        - $ref: "#/components/schemas/RuleInput"
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
    ModeratorInvitationInput:
      type: object
      required:
        - userIdentifier
      properties:
        userIdentifier:
          type: string
          description: Login ID, handle, or service user identifier.
        message:
          type: string
          maxLength: 200
    ModeratorInvitation:
      allOf:
        - $ref: "#/components/schemas/ModeratorInvitationInput"
        - type: object
          required:
            - id
            - status
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - INVITED
                - ACCEPTED
                - DECLINED
                - EXPIRED
    Community:
      type: object
      required:
        - id
        - displayName
        - slug
        - categoryId
        - visibility
        - joinPolicy
        - status
        - ownerUserId
        - launchedAt
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        slug:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type: string
        visibility:
          $ref: "#/components/schemas/CommunityVisibility"
        joinPolicy:
          $ref: "#/components/schemas/JoinPolicy"
        status:
          type: string
          enum:
            - ACTIVE
            - SUSPENDED
        ownerUserId:
          type: string
          format: uuid
        launchedAt:
          type: string
          format: date-time
    ReviewQueuePage:
      type: object
      required:
        - items
        - page
        - size
        - totalElements
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReviewListItem"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
    ReviewListItem:
      type: object
      required:
        - requestId
        - displayName
        - slug
        - categoryId
        - creatorUserId
        - riskLevel
        - status
        - submittedAt
      properties:
        requestId:
          type: string
          format: uuid
        displayName:
          type: string
        slug:
          type: string
        categoryId:
          type: string
          format: uuid
        creatorUserId:
          type: string
          format: uuid
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        status:
          $ref: "#/components/schemas/ReviewQueueStatus"
        submittedAt:
          type: string
          format: date-time
    ReviewDetail:
      type: object
      required:
        - request
        - auditEvents
      properties:
        request:
          $ref: "#/components/schemas/CommunityCreationRequest"
        auditEvents:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    ReviewDecisionRequest:
      type: object
      required:
        - decision
        - reasonCode
        - reasonText
        - expectedRequestUpdatedAt
      properties:
        decision:
          type: string
          enum:
            - APPROVED
            - REJECTED
            - CHANGE_REQUESTED
        reasonCode:
          type: string
          minLength: 2
          maxLength: 40
        reasonText:
          type: string
          minLength: 5
          maxLength: 1000
        expectedRequestUpdatedAt:
          type: string
          format: date-time
    ReviewDecisionResponse:
      type: object
      required:
        - request
      properties:
        communityId:
          type: string
          format: uuid
          nullable: true
        request:
          $ref: "#/components/schemas/CommunityCreationRequest"
    AuditEvent:
      type: object
      required:
        - id
        - actorUserId
        - eventType
        - summary
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        actorUserId:
          type: string
          format: uuid
        eventType:
          type: string
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
    RiskSignal:
      type: object
      required:
        - code
        - severity
        - message
      properties:
        code:
          type: string
        severity:
          type: string
          enum:
            - INFO
            - WARNING
            - BLOCKING
        message:
          type: string
    FieldError:
      type: object
      required:
        - field
        - code
        - message
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    CommunityVisibility:
      type: string
      enum:
        - PUBLIC
        - PRIVATE
        - INVITE_ONLY
    JoinPolicy:
      type: string
      enum:
        - OPEN
        - APPROVAL_REQUIRED
        - INVITE_ONLY
    CreationRequestStatus:
      type: string
      enum:
        - DRAFT
        - VALIDATION_FAILED
        - READY_TO_SUBMIT
        - PENDING_REVIEW
        - APPROVED
        - REJECTED
        - CHANGE_REQUESTED
        - LAUNCHED
    ReviewQueueStatus:
      type: string
      enum:
        - PENDING_REVIEW
        - APPROVED
        - REJECTED
        - CHANGE_REQUESTED
    RiskLevel:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    BoardType:
      type: string
      enum:
        - GENERAL
        - NOTICE
        - QNA
        - MEDIA
    Role:
      type: string
      enum:
        - OWNER
        - MODERATOR
        - MEMBER
