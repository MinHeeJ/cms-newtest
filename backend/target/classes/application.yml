server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: cms
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/cms}
    username: ${POSTGRES_USER:cms}
    password: ${POSTGRES_PASSWORD:cms_password}
  servlet:
    multipart:
      max-file-size: ${CMS_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${CMS_UPLOAD_MAX_REQUEST_SIZE:20MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

cms:
  jwt:
    secret: ${JWT_SECRET:ChangeMe1234567890ChangeMe1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CMS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  upload:
    base-path: ${CMS_UPLOAD_BASE_PATH:/app/uploads}
    max-file-bytes: ${CMS_UPLOAD_MAX_FILE_BYTES:10485760}
    max-request-bytes: ${CMS_UPLOAD_MAX_REQUEST_BYTES:20971520}
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - pdf
      - doc
      - docx
      - xls
      - xlsx
      - md
      - zip
