services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://cms:cms@postgres:5432/cms_site_creation
      SITE_CREATION_DATA_FILE: /app/.data/site-creation.json
    ports:
      - "3000:3000"
    volumes:
      - cms-site-data:/app/.data
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms_site_creation
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    ports:
      - "5432:5432"
    volumes:
      - cms-postgres-data:/var/lib/postgresql/data

volumes:
  cms-site-data:
  cms-postgres-data:
