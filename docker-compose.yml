services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://cms:cms@postgres:5432/cms
      PORT: 3000
      HOST: 0.0.0.0
      STORAGE_BASE_URL: http://localhost:3000/uploads
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    ports:
      - "5432:5432"
    volumes:
      - cms-postgres-data:/var/lib/postgresql/data

volumes:
  cms-postgres-data:
