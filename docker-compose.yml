services:
  cms-frontend:
    build:
      context: ./frontend
    depends_on:
      cms-backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - cms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 20s
      timeout: 5s
      retries: 5

  cms-backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cms}
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cms_password}
      JWT_SECRET: ${JWT_SECRET:-ChangeMe1234567890ChangeMe1234567890}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      CMS_UPLOAD_BASE_PATH: ${CMS_UPLOAD_BASE_PATH:-/app/uploads}
      CMS_UPLOAD_MAX_FILE_BYTES: ${CMS_UPLOAD_MAX_FILE_BYTES:-10485760}
      CMS_UPLOAD_MAX_REQUEST_BYTES: ${CMS_UPLOAD_MAX_REQUEST_BYTES:-20971520}
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - cms-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health | grep -q UP"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cms}
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - cms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-cms}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  cms-net:

volumes:
  postgres-data:
  uploads-data:
