services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    ports:
      - "5433:5432"
    volumes:
      - cms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cms
      DB_USER: cms
      DB_PASSWORD: cms
      PORT: 8085
      CORS_ORIGIN: http://localhost:5188,http://frontend:5188
      STORAGE_BASE_URL: http://localhost:8085/uploads
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure:5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8085
    ports:
      - "5188:5188"
    depends_on:
      - backend

volumes:
  cms-postgres-data:
