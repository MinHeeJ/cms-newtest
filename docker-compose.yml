services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d community"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - community-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://db:5432/community
      DB_USERNAME: community
      DB_PASSWORD: community
      COMMUNITY_CORS_ORIGINS: http://localhost:5173,http://localhost:8081
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  community-postgres-data:
